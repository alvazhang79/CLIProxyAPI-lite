<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="CLIProxyAPI Lite Logo">
  <title>CLIProxyAPI Lite</title>
  <desc>Lightweight AI Gateway, Powered by Edge. A shrimp mascot with lightning bolt on a cloud, representing fast, lightweight API proxy at the edge.</desc>

  <defs>
    <!-- Coral shrimp gradient -->
    <linearGradient id="shrimpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#E85A24"/>
    </linearGradient>
    <!-- Teal cloud gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#3DBDB5"/>
    </linearGradient>
    <!-- Lightning gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE66D"/>
      <stop offset="100%" style="stop-color:#F5C518"/>
    </linearGradient>
    <!-- Navy text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2C2C54"/>
      <stop offset="100%" style="stop-color:#3D3D6B"/>
    </linearGradient>
  </defs>

  <!-- === LEFT MARK: Shrimp + Lightning + Cloud === -->
  <g transform="translate(8, 4)">

    <!-- Cloud shape (CF edge = cloud) -->
    <path d="M 12 52
             Q 4 52 4 45
             Q 4 38 12 36
             Q 12 26 24 26
             Q 36 22 46 28
             Q 54 24 62 30
             Q 68 28 68 38
             Q 74 40 74 48
             Q 74 54 66 54
             Z"
          fill="url(#cloudGrad)" opacity="0.18"/>

    <!-- Shrimp body -->
    <g transform="translate(18, 22)">
      <!-- Body segments (curved shrimp shape) -->
      <ellipse cx="22" cy="22" rx="16" ry="9" fill="url(#shrimpGrad)" transform="rotate(-10, 22, 22)"/>
      <!-- Tail fan -->
      <path d="M 4 26 Q 0 22 4 18 L 10 22 Z" fill="#FF6B35"/>
      <path d="M 4 26 Q 0 30 4 34 L 10 30 Z" fill="#E85A24"/>
      <!-- Head -->
      <circle cx="36" cy="18" r="6" fill="url(#shrimpGrad)"/>
      <!-- Eye -->
      <circle cx="38" cy="16" r="2" fill="#2C2C54"/>
      <!-- Antennae -->
      <path d="M 40 14 Q 48 8 52 12" stroke="#FF6B35" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M 40 16 Q 50 14 54 18" stroke="#FF6B35" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Legs (3 pairs) -->
      <line x1="18" y1="28" x2="14" y2="34" stroke="#E85A24" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="24" y1="28" x2="22" y2="35" stroke="#E85A24" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="30" y1="26" x2="30" y2="33" stroke="#E85A24" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Lightning bolt overlay -->
    <g transform="translate(30, 20)">
      <path d="M 10 0 L 2 14 L 9 14 L 5 26 L 16 11 L 9 11 L 13 0 Z"
            fill="url(#boltGrad)" stroke="#F5C518" stroke-width="0.5"/>
    </g>
  </g>

  <!-- === TEXT: CLIProxyAPI Lite === -->
  <!-- "CLI" in coral -->
  <text x="92" y="32"
        font-family="'Courier New', Courier, monospace"
        font-size="22" font-weight="bold" letter-spacing="1"
        fill="#FF6B35">CLI</text>

  <!-- "ProxyAPI" in navy -->
  <text x="130" y="32"
        font-family="'Courier New', Courier, monospace"
        font-size="22" font-weight="bold" letter-spacing="0.5"
        fill="url(#textGrad)">ProxyAPI</text>

  <!-- "Lite" in teal with subtle badge -->
  <text x="92" y="52"
        font-family="'Arial', sans-serif"
        font-size="15" font-weight="600" letter-spacing="2"
        fill="#4ECDC4">Lite</text>

  <!-- Tagline -->
  <text x="138" y="52"
        font-family="'Arial', sans-serif"
        font-size="10" letter-spacing="0.5"
        fill="#999" font-style="italic">// AI Gateway, Edge Powered</text>

  <!-- Separator line -->
  <line x1="92" y1="58" x2="270" y2="58" stroke="#E0E0E0" stroke-width="0.5"/>

</svg>
