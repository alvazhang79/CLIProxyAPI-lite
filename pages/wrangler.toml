name = "cliproxyapi-lite-pages"
compatibility_date = "2024-04-15"
pages_build_output_dir = "dist"

# ---- Secrets (set via `wrangler secret put`) ----
# ADMIN_TOKEN          - plaintext admin token for login

# ---- KV Namespaces ----
# NOTE: Create via `wrangler kv:namespace create cliproxyapi_kv`
#       and paste the id below (same id as Workers kv_namespace)
# [[kv_namespaces]]
# binding = "KV"
# id = "<fill-in-after-creation>"

# ---- D1 Databases ----
# NOTE: Create via `wrangler d1 create cliproxyapi-lite-db`
#       and paste the id below (same id as Workers d1_database)
# [[d1_databases]]
# binding = "D1"
# database_name = "cliproxyapi-lite-db"
# database_id = "<fill-in-after-creation>"

# ---- Workers Integration ----
# The Pages frontend calls Workers admin API at this URL
# Set via `wrangler secret put WORKERS_API_URL`
# Example: https://cliproxyapi-lite.xxx.workers.dev
