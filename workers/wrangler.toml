name = "cliproxyapi-lite"
main = "src/index.ts"
compatibility_date = "2024-04-15"
compatibility_flags = ["nodejs_compat"]

# ---- KV Namespaces ----
[[kv_namespaces]]
binding = "KV"
id = "" # Set via `wrangler kv:namespace create cliproxyapi_kv`

# ---- D1 Databases ----
[[d1_databases]]
binding = "D1"
database_name = "cliproxyapi-lite-db"
database_id = "" # Set after `wrangler d1 create cliproxyapi-lite-db`

# ---- Development Variables ----
[vars]
WORKERS_ENV = "development"

# ---- Production Variables ----
# ADMIN_TOKEN must be set as a Secret via:
#   wrangler secret put ADMIN_TOKEN --env production
#   or Cloudflare Dashboard → Workers → Settings → Variables & Secrets
[env.production.vars]
WORKERS_ENV = "production"

# ---- Analytics Engine ----
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "cliproxyapi-lite"

# ---- Workers Logpush ----
# logpush = true

# ---- Limit CPU time (for security) ----
# max_execution_time_ms = 30000
