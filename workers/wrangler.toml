name = "cliproxyapi-lite"
main = "src/index.ts"
compatibility_date = "2024-04-15"
compatibility_flags = ["nodejs_compat"]

# ---- KV Namespaces (production) ----
[[env.production.kv_namespaces]]
binding = "KV"
id = "4e81ec19fea94b9a860707970faf1415"

# ---- D1 Databases (production) ----
[[env.production.d1_databases]]
binding = "D1"
database_name = "cliproxyapi-lite-db"
database_id = "4644e1d1-138b-4fa4-b97a-34adbf664bc4"

# ---- Environment Variables ----
[vars]
WORKERS_ENV = "development"

[env.production.vars]
WORKERS_ENV = "production"

# ---- Analytics Engine ----
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "cliproxyapi-lite"
