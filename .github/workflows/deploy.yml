name: Deploy CLIProxyAPI Lite

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Typecheck & Build
  # ============================================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Workers typecheck
      - name: Install Workers deps
        run: cd workers && npm ci

      - name: TypeScript check (Workers)
        run: cd workers && npx tsc --noEmit

      # Pages typecheck
      - name: Install Pages deps
        run: cd pages && npm ci

      - name: Build Pages
        run: cd pages && npm run build

  # ============================================================
  # Provision Infrastructure (create KV + D1 if needed)
  # ============================================================
  provision:
    name: Provision CF Resources
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      kv_id: ${{ steps.create-kv.outputs.kv_id }}
      d1_id: ${{ steps.create-d1.outputs.d1_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Authenticate wrangler
        run: |
          mkdir -p ~/.wrangler
          printf '[defaults]\naccount_id = "%s"\n' "$CLOUDFLARE_ACCOUNT_ID" > ~/.wrangler/wrangler.toml
          echo "Wrangler config written"

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create KV namespace
        id: create-kv
        run: |
          KV_RESULT=$(wrangler kv:namespace create cliproxyapi_kv 2>&1)
          echo "$KV_RESULT"
          KV_ID=$(echo "$KV_RESULT" | grep "id:" | head -1 | awk '{print $2}' | tr -d '"' || echo "")
          echo "kv_id=$KV_ID" >> $GITHUB_OUTPUT
          echo "KV_ID=$KV_ID"

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create D1 database
        id: create-d1
        run: |
          D1_RESULT=$(wrangler d1 create cliproxyapi-lite-db 2>&1)
          echo "$D1_RESULT"
          D1_ID=$(echo "$D1_RESULT" | grep "uuid:" | head -1 | awk '{print $2}' | tr -d '"' || echo "")
          echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
          echo "D1_ID=$D1_ID"

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run D1 migrations
        run: |
          echo "Running migrations..."
          # Write updated wrangler.toml with real IDs
          sed -i 's/id = ""/id = "${{ needs.provision.outputs.kv_id }}"/' workers/wrangler.toml
          sed -i 's/database_id = ""/database_id = "${{ needs.provision.outputs.d1_id }}"/' workers/wrangler.toml

          cd workers
          npx wrangler d1 execute cliproxyapi-lite-db --file=scripts/init-d1.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ============================================================
  # Deploy Workers
  # ============================================================
  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    needs: provision
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Update wrangler.toml with real IDs
        run: |
          # Replace placeholder IDs with actual provisioned IDs
          sed -i 's/id = ""/id = "${{ needs.provision.outputs.kv_id }}"/' workers/wrangler.toml
          sed -i 's/database_id = ""/database_id = "${{ needs.provision.outputs.d1_id }}"/' workers/wrangler.toml
          echo "wrangler.toml updated"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Workers deps
        run: cd workers && npm ci

      - name: Deploy Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: workers

  # ============================================================
  # Deploy Pages
  # ============================================================
  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: deploy-workers
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Pages deps
        run: cd pages && npm ci

      - name: Build Pages
        run: |
          cd pages
          echo "VITE_WORKERS_API_URL=https://$(echo '${{ needs.deploy-workers.outputs.workers_url }}' | sed 's/https:\/\///')" >> .env
          npm run build
        env:
          VITE_WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}

      - name: Deploy Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cliproxyapi-lite-pages
          directory: pages/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # GitHub Release
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-pages]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            README.md
            README_ZH.md
            docs/DEPLOY.md
            docs/DEPLOY_ZH.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
