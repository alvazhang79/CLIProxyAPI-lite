name: Deploy CLIProxyAPI Lite

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # TypeScript Check & Build
  # ============================================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Workers typecheck
      - name: Install Workers deps
        run: cd workers && npm ci

      - name: TypeScript check (Workers)
        run: cd workers && npx tsc --noEmit

      # Pages typecheck
      - name: Install Pages deps
        run: cd pages && npm ci

      - name: Build Pages
        run: cd pages && npm run build

  # ============================================================
  # Deploy Workers + Pages (single job to avoid cross-job output issues)
  # ============================================================
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -------------------------------------------------------
      # 1. Provision KV namespace (get existing ID)
      # -------------------------------------------------------
      - name: Create KV namespace
        id: kv-step
        run: |
          echo "Fetching KV namespace ID..."
          LIST=$(curl -s --max-time 30 -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces")
          KV_ID=$(echo "$LIST" | python3 -c "import sys,json; ids=[n['id'] for n in json.load(sys.stdin)['result'] if n['title']=='cliproxyapi_kv']; print(ids[0] if ids else '')" 2>/dev/null)
          echo "KV_ID=$KV_ID"
          echo "KV_ID=$KV_ID" >> $GITHUB_ENV
          if [ -z "$KV_ID" ]; then echo "ERROR: KV_ID is empty"; exit 1; fi

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # -------------------------------------------------------
      # 2. Provision D1 database (get existing UUID)
      # -------------------------------------------------------
      - name: Create D1 database
        id: d1-step
        run: |
          echo "Fetching D1 database UUID..."
          RESP=$(curl -s --max-time 30 -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database")
          D1_ID=$(echo "$RESP" | python3 -c "import sys,json; ids=[d['uuid'] for d in json.load(sys.stdin)['result'] if d['name']=='cliproxyapi-lite-db']; print(ids[0] if ids else '')" 2>/dev/null)
          echo "D1_ID=$D1_ID"
          echo "D1_ID=$D1_ID" >> $GITHUB_ENV
          if [ -z "$D1_ID" ]; then echo "ERROR: D1_ID is empty"; exit 1; fi

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # -------------------------------------------------------
      # 3. Update wrangler.toml with real IDs
      # -------------------------------------------------------
      - name: Configure wrangler.toml
        run: |
          echo "Updating wrangler.toml with KV_ID=$KV_ID and D1_ID=$D1_ID"
          # Update env.production kv_namespaces id
          sed -i "s/id = \"4e81ec19fea94b9a860707970faf1415\"/id = \"$KV_ID\"/" workers/wrangler.toml
          sed -i "s/database_id = \"4644e1d1-138b-4fa4-b97a-34adbf664bc4\"/database_id = \"$D1_ID\"/" workers/wrangler.toml
          grep -E "kv_namespaces|d1_databases|id =|database_id =" workers/wrangler.toml || true

      # -------------------------------------------------------
      # 4. Run D1 migrations (SQLite schema)
      # -------------------------------------------------------
      - name: Run D1 migrations
        run: |
          echo "Running D1 migrations on remote..."
          npx wrangler d1 execute cliproxyapi-lite-db --file=scripts/init-d1.sql --remote --yes

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # -------------------------------------------------------
      # 5. Install Workers deps
      # -------------------------------------------------------
      - name: Install Workers deps
        run: |
          echo "Installing Workers dependencies..."
          cd workers && npm ci

      # -------------------------------------------------------
      # 6. Deploy Workers
      # -------------------------------------------------------
      # Deploy Workers FIRST (wrangler v4 requires version deployed before setting secrets)
      - name: Deploy Workers
        id: deploy-workers
        run: |
          echo "Deploying Workers..."
          cd workers
          DEPLOY_OUTPUT=$(npx wrangler deploy --env production --dry-run 2>&1 || true)
          echo "Dry run: $DEPLOY_OUTPUT"
          # Force upload by deleting old script then deploying
          echo "Deleting old worker..."
          npx wrangler workers delete cliproxyapi-lite-production --yes 2>/dev/null || true
          echo "Deploying fresh..."
          DEPLOY_OUTPUT=$(npx wrangler deploy --env production 2>&1)
          echo "$DEPLOY_OUTPUT"
          WORKERS_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9_.-]+\.workers\.dev[^ >]*' | head -1 | tr -d ' ')
          if [ -z "$WORKERS_URL" ]; then
            echo "WORKERS_URL not found in output, constructing from known pattern..."
            WORKERS_URL="https://cliproxyapi-lite.$CLOUDFLARE_ACCOUNT_ID.workers.dev"
          fi
          echo "WORKERS_URL=$WORKERS_URL"
          echo "WORKERS_URL=$WORKERS_URL" >> $GITHUB_ENV
          echo "workers_url=$WORKERS_URL" >> $GITHUB_OUTPUT

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Set ADMIN_TOKEN secret AFTER deploy (wrangler v4 requirement)
      - name: Set Workers secrets
        run: |
          echo "Setting ADMIN_TOKEN secret..."
          cd workers
          echo "$ADMIN_TOKEN" | npx wrangler secret put ADMIN_TOKEN --env production

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      # -------------------------------------------------------
      # 7. Build Pages (use Workers URL from env)
      # -------------------------------------------------------
      - name: Build Pages
        run: |
          echo "Building Pages with WORKERS_URL=$WORKERS_URL..."
          cd pages
          echo "VITE_WORKERS_API_URL=$WORKERS_URL" >> .env
          cat .env
          npm ci
          npm run build

        env:
          WORKERS_URL: ${{ env.WORKERS_URL }}

      # -------------------------------------------------------
      # 8. Create Pages project (idempotent - succeeds if exists)
      # -------------------------------------------------------
      - name: Create Pages project
        run: |
          echo "Creating Pages project..."
          npx wrangler pages project create cliproxyapi-lite --production-branch=main 2>&1 || true

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # -------------------------------------------------------
      # 9. Deploy Pages via wrangler
      # -------------------------------------------------------
      - name: Deploy Pages
        run: |
          echo "Deploying Pages..."
          cd pages
          npx wrangler pages deploy dist --project-name=cliproxyapi-lite 2>&1

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ============================================================
  # GitHub Release
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            README.md
            README_ZH.md
            docs/DEPLOY.md
            docs/DEPLOY_ZH.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
