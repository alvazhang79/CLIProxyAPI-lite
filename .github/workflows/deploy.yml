name: Deploy CLIProxyAPI Lite

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # TypeScript Check & Build
  # ============================================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Workers typecheck
      - name: Install Workers deps
        run: cd workers && npm ci

      - name: TypeScript check (Workers)
        run: cd workers && npx tsc --noEmit

      # Pages typecheck
      - name: Install Pages deps
        run: cd pages && npm ci

      - name: Build Pages
        run: cd pages && npm run build

  # ============================================================
  # Deploy Workers + Pages (single job to avoid cross-job output issues)
  # ============================================================
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -------------------------------------------------------
      # 1. Get KV namespace ID (create or reuse existing)
      # -------------------------------------------------------
      - name: Create KV namespace
        id: kv-step
        run: |
          echo "Checking for existing KV namespace..."
          LIST=$(curl -s --max-time 30 -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces")

          KV_ID=$(echo "$LIST" | python3 -c "import sys,json; ns=json.load(sys.stdin)['result']; ids=[n['id'] for n in ns if n['title']=='cliproxyapi_kv']; print(ids[0] if ids else '')" 2>/dev/null)
          echo "KV namespace ID: $KV_ID"

          if [ -z "$KV_ID" ]; then
            echo "KV not found, creating new one..."
            RESP=$(curl -s --max-time 30 -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"title":"cliproxyapi_kv"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces")
            echo "KV Create Response: $RESP"
            KV_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['id'])" 2>/dev/null)
          fi

          echo "KV_ID=$KV_ID"
          echo "KV_ID=$KV_ID" >> $GITHUB_ENV
          if [ -z "$KV_ID" ]; then echo "ERROR: KV_ID is empty"; exit 1; fi

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # -------------------------------------------------------
      # 2. Get D1 database UUID
      # Note: CLOUDFLARE_API_TOKEN must have "Cloudflare D1: Edit" permission.
      # If "wrangler d1 list" fails with auth error, the token lacks D1 permission.
      # Known D1 UUID (from previous run): 4644e1d1-138b-4fa4-b97a-34adbf664bc4
      # -------------------------------------------------------
      - name: Create D1 database
        id: d1-step
        run: |
          echo "Fetching D1 database UUID..."
          D1_LIST=$(npx wrangler d1 list 2>&1)
          echo "$D1_LIST"

          # Try to extract UUID from list
          D1_ID=$(echo "$D1_LIST" | grep "cliproxyapi-lite-db" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ -z "$D1_ID" ]; then
            echo "D1 list empty or auth failed. Using known fallback UUID..."
            D1_ID="4644e1d1-138b-4fa4-b97a-34adbf664bc4"
          fi

          echo "D1_ID=$D1_ID"
          echo "D1_ID=$D1_ID" >> $GITHUB_ENV
          if [ -z "$D1_ID" ]; then echo "ERROR: D1_ID is empty"; exit 1; fi

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # -------------------------------------------------------
      # 3. Inject real IDs into wrangler.toml
      # -------------------------------------------------------
      - name: Configure wrangler.toml
        run: |
          echo "KV_ID=$KV_ID"
          echo "D1_ID=$D1_ID"

          # Update workers/wrangler.toml with real IDs
          sed -i "s/id = \"\"/id = \"$KV_ID\"/" workers/wrangler.toml
          sed -i "s/database_id = \"\"/database_id = \"$D1_ID\"/" workers/wrangler.toml

          # Verify
          grep -E "kv_namespaces|d1_databases" -A 3 workers/wrangler.toml || true

      # -------------------------------------------------------
      # 4. Run D1 migrations (SQLite schema)
      # -------------------------------------------------------
      - name: Run D1 migrations
        run: |
          echo "Running D1 migrations on remote..."
          npx wrangler d1 execute cliproxyapi-lite-db --file=scripts/init-d1.sql --remote --yes

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # -------------------------------------------------------
      # 5. Install Workers deps
      # -------------------------------------------------------
      - name: Install Workers deps
        run: |
          echo "Installing Workers dependencies..."
          cd workers && npm ci

      # -------------------------------------------------------
      # 6. Deploy Workers
      # -------------------------------------------------------
      - name: Deploy Workers
        id: deploy-workers
        run: |
          echo "Deploying Workers..."
          cd workers
          # Wrangler prints the URL on success: https://xxx.workers.dev
          DEPLOY_OUTPUT=$(npx wrangler deploy --env production 2>&1)
          echo "$DEPLOY_OUTPUT"
          # Extract URL from output
          WORKERS_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[a-zA-Z0-9_.-]+\.workers\.dev[^ >]*' | head -1 | tr -d ' ')
          if [ -z "$WORKERS_URL" ]; then
            echo "WORKERS_URL not found in output, constructing from known pattern..."
            WORKERS_URL="https://cliproxyapi-lite.$CLOUDFLARE_ACCOUNT_ID.workers.dev"
          fi
          echo "WORKERS_URL=$WORKERS_URL"
          echo "WORKERS_URL=$WORKERS_URL" >> $GITHUB_ENV
          echo "workers_url=$WORKERS_URL" >> $GITHUB_OUTPUT

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # -------------------------------------------------------
      # 7. Build Pages (use Workers URL from env)
      # -------------------------------------------------------
      - name: Build Pages
        run: |
          echo "Building Pages with WORKERS_URL=$WORKERS_URL..."
          cd pages
          echo "VITE_WORKERS_API_URL=$WORKERS_URL" >> .env
          cat .env
          npm ci
          npm run build

        env:
          WORKERS_URL: ${{ env.WORKERS_URL }}

      # -------------------------------------------------------
      # 8. Create Pages project (direct-upload mode, no GitHub OAuth needed)
      # -------------------------------------------------------
      - name: Create Pages project
        run: |
          echo "Creating Cloudflare Pages project (direct-upload mode)..."
          RESP=$(curl -s --max-time 30 -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name":"cliproxyapi-lite-pages",
              "build_config":{"build_command":"echo no-op","destination_dir":"dist"},
              "source":{"type":"direct_upload","config":{"branch":"main"}}
            }' \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects")
          echo "Pages Response: $RESP"
          if echo "$RESP" | grep -q '"code":8000007'; then
            echo "Pages project already exists"
          elif echo "$RESP" | grep -q '"success":true'; then
            echo "Pages project created successfully"
          else
            echo "Pages project result: $RESP"
          fi

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # -------------------------------------------------------
      # 9. Deploy Pages via wrangler
      # -------------------------------------------------------
      - name: Deploy Pages
        run: |
          echo "Deploying Pages via wrangler..."
          cd pages
          npx wrangler pages deploy dist --project-name=cliproxyapi-lite-pages 2>&1

        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ============================================================
  # GitHub Release
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            README.md
            README_ZH.md
            docs/DEPLOY.md
            docs/DEPLOY_ZH.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
