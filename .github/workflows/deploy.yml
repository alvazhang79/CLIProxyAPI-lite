name: Deploy CLIProxyAPI Lite

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Lint & Typecheck
  # ============================================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            workers/package-lock.json
            pages/package-lock.json

      # Workers typecheck
      - name: Install Workers deps
        run: cd workers && npm ci

      - name: TypeScript check (Workers)
        run: cd workers && npx tsc --noEmit

      # Pages typecheck
      - name: Install Pages deps
        run: cd pages && npm ci

      - name: Build Pages
        run: cd pages && npm run build

  # ============================================================
  # Deploy Workers (on push to main or tag)
  # ============================================================
  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        run: cd workers && npm ci

      - name: Deploy Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
          workingDirectory: workers

      - name: Save Workers URL
        run: echo "workers_url=$(curl -s https://api.cloudflare.com/client/v4/workers/domains?zone_name=${{ secrets.CLOUDFLARE_ZONE_DOMAIN }} | jq -r '.result[0].route')" >> $GITHUB_ENV

  # ============================================================
  # Deploy Pages (on push to main or tag)
  # ============================================================
  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: deploy-workers
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: pages/package-lock.json

      - name: Install dependencies
        run: cd pages && npm ci

      - name: Build Pages
        run: cd pages && npm run build
        env:
          VITE_WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}

      - name: Deploy Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cliproxyapi-lite-pages
          directory: pages/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # D1 Migration (run after Workers deploy)
  # ============================================================
  migrate-d1:
    name: D1 Migration
    runs-on: ubuntu-latest
    needs: deploy-workers
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Run D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute cliproxyapi-lite-db --env production --file=scripts/init-d1.sql
          workingDirectory: workers

  # ============================================================
  # GitHub Release (on tag)
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-workers, deploy-pages, migrate-d1]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            README.md
            README_ZH.md
            docs/DEPLOY.md
            docs/DEPLOY_ZH.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
